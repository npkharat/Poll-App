# For real use, avoid committing plaintext passwords - instead create the
# secret directly on the cluster with:
#   kubectl create secret generic quickpoll-secret --namespace quickpoll \
#     --from-literal=DB_USER=polluser \
#     --from-literal=DB_PASSWORD='pick-a-password' \
#     --from-literal=MYSQL_ROOT_PASSWORD='pick-a-root-password'
# For kind practice, the defaults below are fine as-is.
apiVersion: v1
kind: Secret
metadata:
  name: quickpoll-secret
  namespace: quickpoll
type: Opaque
stringData:
  DB_USER: polluser
  DB_PASSWORD: "pollpassword123"
  MYSQL_ROOT_PASSWORD: "rootpassword123"
