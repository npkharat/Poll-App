apiVersion: apps/v1
kind: Deployment
metadata:
  name: presentation-canary-deployment
  namespace: quickpoll
spec:
  replicas: 10
  selector:
    matchLabels:
      app: presentation
  template:
    metadata:
      labels:
        app: presentation
        version: canary
    spec:
      containers:
        - name: presentation
          # Load with: kind load docker-image quickpoll-presentation:latest --name quickpoll
          image: quickpoll-presentation-canary:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet: { path: /, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "200m", memory: "128Mi" }

