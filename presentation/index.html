<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickPoll</title>

<link rel="stylesheet" href="style.css">

<style>
/* =========================
   NEW MODERN BLUE THEME
   ========================= */

body {
  margin: 0;
  font-family: system-ui, Arial;
  background: #f4f8fb;
  color: #0f172a;
}

/* soft tech background */
.bg-glow {
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 20% 20%, rgba(59,130,246,0.18), transparent 40%),
    radial-gradient(circle at 80% 30%, rgba(20,184,166,0.18), transparent 45%),
    radial-gradient(circle at 50% 80%, rgba(99,102,241,0.12), transparent 50%);
  z-index: -1;
}

/* container */
.container {
  max-width: 1100px;
  margin: auto;
  padding: 28px 18px;
}

/* =========================
   HEADER
   ========================= */

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 30px;
}

/* NEW LOGO (no emoji look) */
.brand {
  display: flex;
  align-items: center;
  gap: 12px;
}

.brand-icon {
  width: 38px;
  height: 38px;
  border-radius: 12px;
  background: linear-gradient(135deg, #3b82f6, #14b8a6);
  box-shadow: 0 10px 20px rgba(59,130,246,0.25);
}

/* stylized "Q" mark */
.brand-icon::after {
  content: "Q";
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  font-weight: 700;
  color: white;
}

h1 {
  margin: 0;
  font-size: 20px;
}

.subtitle {
  margin: 0;
  font-size: 12px;
  opacity: 0.6;
}

/* =========================
   NEW BUTTON DESIGN
   ========================= */

.btn {
  border: none;
  padding: 10px 16px;
  border-radius: 14px;
  cursor: pointer;
  font-weight: 600;
  transition: 0.25s;
}

/* primary gradient button */
.btn-primary {
  background: linear-gradient(135deg, #3b82f6, #14b8a6);
  color: white;
  box-shadow: 0 12px 25px rgba(59,130,246,0.25);
  position: relative;
  overflow: hidden;
}

/* animated shine effect */
.btn-primary::after {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.3), transparent);
  transition: 0.5s;
}

.btn-primary:hover::after {
  left: 100%;
}

.btn-primary:hover {
  transform: translateY(-2px);
}

/* =========================
   GRID
   ========================= */

.poll-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 16px;
}

/* =========================
   CARD STYLE
   ========================= */

.poll-card {
  background: white;
  border-radius: 18px;
  padding: 16px;
  border: 1px solid #e2e8f0;
  transition: 0.25s;
}

.poll-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 15px 35px rgba(0,0,0,0.08);
  border-color: #93c5fd;
}

/* =========================
   BANNER
   ========================= */

.banner {
  padding: 12px 14px;
  background: #e0f2fe;
  border: 1px solid #7dd3fc;
  border-radius: 12px;
  margin-bottom: 16px;
}

/* =========================
   MODAL
   ========================= */

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(15,23,42,0.4);
  display: none;
  align-items: center;
  justify-content: center;
}

.modal {
  width: 380px;
  background: white;
  border-radius: 18px;
  padding: 18px;
  box-shadow: 0 25px 60px rgba(0,0,0,0.15);
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 10px;
  border: 1px solid #e5e7eb;
}

/* secondary button */
.btn-ghost {
  background: #f1f5f9;
  color: #0f172a;
  margin-top: 10px;
  border-radius: 12px;
}

.modal-actions {
  display: flex;
  justify-content: space-between;
  margin-top: 12px;
}

.error-text {
  color: #ef4444;
  font-size: 12px;
  margin-top: 8px;
}
</style>

</head>

<body>

<div class="bg-glow"></div>

<div class="container">

  <header>

    <div class="brand">
      <div class="brand-icon"></div>
      <div>
        <h1>QuickPoll</h1>
        <p class="subtitle">Smart polling platform</p>
      </div>
    </div>

    <button class="btn btn-primary" id="newPollBtn">
      + Create Poll
    </button>

  </header>

  <div id="banner" class="banner" style="display:none;"></div>

  <div class="poll-grid" id="pollGrid"></div>

  <div class="empty-state" id="emptyState" style="display:none;">
    No polls yet. Create the first one!
  </div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">

    <h2>Create a Poll</h2>

    <form id="pollForm">

      <div class="form-row">
        <label>Question</label>
        <input type="text" id="questionInput"
          placeholder="e.g. Best Dev Tool?"
          required maxlength="255">
      </div>

      <label>Options (2–8)</label>
      <div id="optionsList" class="options-list"></div>

      <button type="button" class="btn btn-ghost" id="addOptionBtn">
        + Add option
      </button>

      <div id="formError" class="error-text" style="display:none;"></div>

      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" id="cancelBtn">Cancel</button>
        <button type="submit" class="btn btn-primary">Create Poll</button>
      </div>

    </form>

  </div>
</div>

<script src="config.js"></script>
<script src="app.js"></script>

</body>
</html>
